<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Upzy — Iniciar sesión</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;--text:#e6edf3;--t2:#9198a1;--t3:#545d68;--green:#2ea043;--gb:#3fb950;--red:#f85149;--r:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:400px}
.logo-area{text-align:center;margin-bottom:32px}
.logo-box{display:inline-flex;align-items:center;gap:12px;margin-bottom:10px}
.logo-mark{width:48px;height:48px;background:#161b22;border:2px solid var(--gb);border-radius:var(--r);display:flex;align-items:center;justify-content:center;color:var(--gb);font-size:22px;font-weight:700}
.logo-name{font-size:28px;font-weight:700;color:var(--text)}
.logo-sub{font-size:12px;color:var(--t3);letter-spacing:1px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:28px}
.card-title{font-size:16px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:13px;color:var(--t2);margin-bottom:24px}
.fg{margin-bottom:16px}
label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px}
input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
input:focus{border-color:var(--gb)}
input.error{border-color:var(--red)}
.password-wrap{position:relative}
.password-wrap input{padding-right:40px}
.toggle-pass{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:16px;padding:0;line-height:1}
.toggle-pass:hover{color:var(--t2)}
.btn-login{width:100%;background:var(--green);border:none;border-radius:var(--r);padding:11px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px}
.btn-login:hover:not(:disabled){background:var(--gb)}
.btn-login:disabled{opacity:.6;cursor:not-allowed}
.error-msg{background:#f8514915;border:1px solid var(--red);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--red);margin-top:14px;display:none;align-items:center;gap:8px}
.error-msg.show{display:flex}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.forgot{text-align:center;font-size:12px;color:var(--t3)}
.forgot a{color:var(--gb);text-decoration:none}
.forgot a:hover{text-decoration:underline}
.footer-txt{text-align:center;margin-top:20px;font-size:11px;color:var(--t3)}
.spinner{width:16px;height:16px;border:2px solid #ffffff44;border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tenant-badge{display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:4px 12px;font-size:11px;color:var(--t2);margin-bottom:20px}
.tenant-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--gb)}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-box">
      <div class="logo-mark">U</div>
      <div class="logo-name">Upzy</div>
    </div>
    <div class="logo-sub">PLATAFORMA DE COMUNICACIONES</div>
  </div>

  <div class="card">
    <div class="card-title">Iniciar sesión</div>
    <div class="card-sub">Ingresa con tus credenciales de acceso</div>

    <div class="fg">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@empresa.cl" autocomplete="email" autofocus>
    </div>
    <div class="fg">
      <label for="password">Contraseña</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
        <button class="toggle-pass" onclick="togglePass()" type="button" id="toggle-btn">👁</button>
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="login()">
      <span id="btn-text">Ingresar</span>
    </button>

    <div class="error-msg" id="error-msg">
      <span>⚠️</span>
      <span id="error-text">Error de autenticación</span>
    </div>

    <hr class="divider">
    <div class="forgot">
      <a href="#" onclick="showForgot();return false">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <div class="footer-txt">© 2026 Upzy · Klinge</div>
</div>

<script>
const API = window.location.origin;

function togglePass() {
  const inp = document.getElementById('password');
  const btn = document.getElementById('toggle-btn');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  document.getElementById('error-text').textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('error-msg').classList.remove('show'); }

async function login() {
  hideError();
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const btnText  = document.getElementById('btn-text');

  if (!email || !password) { showError('Completa todos los campos'); return; }

  // Loading state
  btn.disabled = true;
  btnText.innerHTML = '<div class="spinner"></div>';

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Error de autenticación');
      return;
    }

    // Guardar sesión
    sessionStorage.setItem('upzy_token',         data.token);
    sessionStorage.setItem('upzy_refresh_token', data.refresh_token);
    sessionStorage.setItem('upzy_user',          JSON.stringify(data.user));
    sessionStorage.setItem('upzy_expires_at',    data.expires_at);

    // Redirigir al dashboard
    window.location.href = '/dashboard';

  } catch (err) {
    showError('No se pudo conectar al servidor');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Ingresar';
  }
}

function showForgot() {
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Ingresa tu email primero'); return; }
  // Aquí puedes integrar Supabase password reset
  alert(`Se enviará un link de recuperación a: ${email}\n(Implementar con Supabase resetPasswordForEmail)`);
}

// Si ya hay sesión válida, redirigir
const token    = sessionStorage.getItem('upzy_token');
const expiresAt= sessionStorage.getItem('upzy_expires_at');
if (token && expiresAt && Date.now() / 1000 < parseInt(expiresAt)) {
  window.location.href = '/dashboard';
}
</script>
</body>
</html>
